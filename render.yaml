databases:
  - name: smd-vital-db
    databaseName: smd_vital
    user: smd_vital_user
    plan: free
    region: oregon

services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: smd-vital-backend
    runtime: docker
    dockerfilePath: ./smd-vital-backend/Dockerfile
    dockerContext: ./smd-vital-backend
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: smd-vital-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://smd-vital-admin.onrender.com
      - key: ADMIN_URL
        value: https://smd-vital-admin.onrender.com
      - key: CORS_ORIGIN
        value: https://smd-vital-admin.onrender.com

  # ─── Panel Administrativo (Static Site) ─────────────────────────────────────
  - type: web
    name: smd-vital-admin
    runtime: static
    buildCommand: cd admin-panel-frontend && npm install && npm run build
    staticPublishPath: ./admin-panel-frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://smd-vital-backend.onrender.com/api/v1
      - key: VITE_APP_NAME
        value: SMD Vital Admin
