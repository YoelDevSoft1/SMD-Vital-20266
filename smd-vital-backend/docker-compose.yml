version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smd-vital-postgres
    environment:
      POSTGRES_DB: smd_vital_db
      POSTGRES_USER: smd_vital_user
      POSTGRES_PASSWORD: smd_vital_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - smd-vital-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smd_vital_user -d smd_vital_db"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smd-vital-redis
    command: redis-server --appendonly yes --requirepass smd_vital_redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - smd-vital-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # SMD Vital Backend
  backend:
    build: .
    container_name: smd-vital-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://smd_vital_user:smd_vital_password@postgres:5432/smd_vital_db
      REDIS_URL: redis://:smd_vital_redis_password@redis:6379
      JWT_SECRET: your-super-secret-jwt-key-here-change-in-production
      JWT_REFRESH_SECRET: your-refresh-secret-key-here-change-in-production
      CORS_ORIGIN: http://localhost:4322
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASS: your-app-password
      FROM_EMAIL: noreply@smdvitalbogota.com
      TWILIO_ACCOUNT_SID: your-twilio-account-sid
      TWILIO_AUTH_TOKEN: your-twilio-auth-token
      TWILIO_PHONE_NUMBER: +1234567890
      STRIPE_SECRET_KEY: sk_test_your-stripe-secret-key
      STRIPE_PUBLISHABLE_KEY: pk_test_your-stripe-publishable-key
      GOOGLE_MAPS_API_KEY: your-google-maps-api-key
    ports:
      - "3000:3000"
    networks:
      - smd-vital-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Prisma Studio (Independent Container)
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile.prisma
    container_name: smd-vital-prisma-studio
    environment:
      DATABASE_URL: postgresql://smd_vital_user:smd_vital_password@postgres:5432/smd_vital_db
    ports:
      - "5555:5555"
    networks:
      - smd-vital-network
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - dev
      - tools
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5555"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: smd-vital-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    networks:
      - smd-vital-network
    depends_on:
      - backend
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: smd-vital-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - smd-vital-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  # Node Exporter
  node-exporter:
    image: prom/node-exporter:latest
    container_name: smd-vital-node-exporter
    ports:
      - "9100:9100"
    networks:
      - smd-vital-network
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro'
    privileged: true

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: smd-vital-redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: smd_vital_redis_password
    networks:
      - smd-vital-network
    depends_on:
      - redis
    restart: unless-stopped

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: smd-vital-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://smd_vital_user:smd_vital_password@postgres:5432/smd_vital_db?sslmode=disable"
    networks:
      - smd-vital-network
    depends_on:
      - postgres
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: smd-vital-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - smd-vital-network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  smd-vital-network:
    driver: bridge



