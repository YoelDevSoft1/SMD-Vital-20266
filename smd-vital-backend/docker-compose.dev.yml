# Configuración específica para desarrollo
# Incluye Prisma Studio y herramientas de desarrollo

version: '3.8'

services:
  # Prisma Studio para desarrollo
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile.prisma
    container_name: smd-vital-prisma-studio-dev
    environment:
      DATABASE_URL: postgresql://smd_vital_user:smd_vital_password@postgres:5432/smd_vital_db
    ports:
      - "5555:5555"
    networks:
      - smd-vital-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - dev

  # Backend en modo desarrollo (con hot reload)
  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smd-vital-backend-dev
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://smd_vital_user:smd_vital_password@postgres:5432/smd_vital_db
      REDIS_URL: redis://:smd_vital_redis_password@redis:6379
      JWT_SECRET: dev-jwt-secret-key
      JWT_REFRESH_SECRET: dev-refresh-secret-key
      CORS_ORIGIN: http://localhost:4322
    ports:
      - "3000:3000"
    networks:
      - smd-vital-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    command: ["npm", "run", "dev"]
    profiles:
      - dev

networks:
  smd-vital-network:
    external: true

