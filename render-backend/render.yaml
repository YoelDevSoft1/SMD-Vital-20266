services:
  # Backend API
  - type: web
    name: smd-vital-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: smd-vital-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: smd-vital-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://smd-vital-admin.onrender.com
      - key: ADMIN_URL
        value: https://smd-vital-admin.onrender.com

  # Panel de Administración
  - type: web
    name: smd-vital-admin
    env: static
    buildCommand: cd admin-panel-frontend && npm install && npm run build
    staticPublishPath: admin-panel-frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Base de datos PostgreSQL
  - type: pserv
    name: smd-vital-db
    env: postgresql
    plan: free
    region: oregon

  # Redis Cache
  - type: redis
    name: smd-vital-redis
    plan: free
    region: oregon
