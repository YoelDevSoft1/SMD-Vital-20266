# Docker Compose completo para SMD Vital
# Incluye Backend + Panel de Administración
# Configuración optimizada para evitar conflictos con otros proyectos Docker

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smdvital-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smd_vital_db}
      POSTGRES_USER: ${POSTGRES_USER:-smd_vital_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smd_vital_password}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=es_CO.UTF-8"
    volumes:
      - smdvital_postgres_data:/var/lib/postgresql/data
      - ./smd-vital-backend/scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5433}:5432"
    networks:
      - smdvital_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smd_vital_user} -d ${POSTGRES_DB:-smd_vital_db}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    labels:
      - "com.smdvital.service=postgres"
      - "com.smdvital.project=smd-vital"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smdvital-redis
    command: >
      redis-server 
      --appendonly yes 
      --requirepass ${REDIS_PASSWORD:-smd_vital_redis_password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - smdvital_redis_data:/data
    ports:
      - "${REDIS_EXTERNAL_PORT:-6380}:6379"
    networks:
      - smdvital_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    labels:
      - "com.smdvital.service=redis"
      - "com.smdvital.project=smd-vital"

  # SMD Vital Backend
  backend:
    build:
      context: ./smd-vital-backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
    container_name: smdvital-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-smd_vital_user}:${POSTGRES_PASSWORD:-smd_vital_password}@postgres:5432/${POSTGRES_DB:-smd_vital_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-smd_vital_redis_password}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-smd-vital-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-smd-vital-refresh-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174,http://localhost:4322}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: ${LOG_FILE:-logs/app.log}
      # Optional configurations
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@smdvitalbogota.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@smdvitalbogota.com}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - smdvital_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./smd-vital-backend/logs:/app/logs
      - ./smd-vital-backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    labels:
      - "com.smdvital.service=backend"
      - "com.smdvital.project=smd-vital"

  # Panel de Administración Frontend
  admin-panel:
    build:
      context: ./admin-panel-frontend
      dockerfile: Dockerfile
    container_name: smdvital-admin-panel
    ports:
      - "${ADMIN_PANEL_PORT:-5174}:80"
    environment:
      - NODE_ENV=production
    networks:
      - smdvital_network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.smdvital.service=admin-panel"
      - "com.smdvital.project=smd-vital"

  # Prisma Studio (Solo para desarrollo)
  prisma-studio:
    build:
      context: ./smd-vital-backend
      dockerfile: Dockerfile.prisma
    container_name: smdvital-prisma-studio
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smd_vital_user}:${POSTGRES_PASSWORD:-smd_vital_password}@postgres:5432/${POSTGRES_DB:-smd_vital_db}
    ports:
      - "${PRISMA_STUDIO_EXTERNAL_PORT:-5556}:5555"
    networks:
      - smdvital_network
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - dev
      - tools
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5555"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.smdvital.service=prisma-studio"
      - "com.smdvital.project=smd-vital"

volumes:
  smdvital_postgres_data:
    driver: local
    name: smdvital_postgres_data
  smdvital_redis_data:
    driver: local
    name: smdvital_redis_data

networks:
  smdvital_network:
    driver: bridge
    name: smdvital_network
    ipam:
      config:
        - subnet: 172.28.0.0/16

