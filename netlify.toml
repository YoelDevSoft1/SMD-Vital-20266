[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--production=false"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.images]
  compress = true

[[redirects]]
  from = "http://www.smdvitalbogota.com/*"
  to = "https://smdvitalbogota.com/:splat"
  status = 301

[[redirects]]
  from = "https://www.smdvitalbogota.com/*"
  to = "https://smdvitalbogota.com/:splat"
  status = 301

[[redirects]]
  from = "http://smdvitalbogota.com/*"
  to = "https://smdvitalbogota.com/:splat"
  status = 301

[[redirects]]
  from = "/acerca"
  to = "/inicio/quienes-somos"
  status = 301

[[redirects]]
  from = "/prueba-de-antigeno-a-domicilio"
  to = "/antigeno"
  status = 301

[[redirects]]
  from = "/terms"
  to = "/terminos"
  status = 301

[[redirects]]
  from = "/servicios/lavado-de-oidos-a-domicilio"
  to = "/lavado-de-oidos-a-domicilio"
  status = 301

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
